---
name: Deploy Pages
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  pages:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-deploy-pages.yaml@34df7a3a2447da57bb69d3b7c74f10c15af5af4a # main
    with:
      runs-on: ubuntu-latest
