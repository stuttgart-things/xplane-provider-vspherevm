---
name: Deploy Pages
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  pages:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-deploy-pages.yaml@aae22cf0e97e68198e03ccb145a4824ba12e3f1c # main
    with:
      runs-on: ubuntu-latest
