name: vmware/vsphere
resources:
    vsphere_virtual_machine:
        subCategory: Virtual Machine
        description: Manages a VMware vSphere virtual machine resource.
        name: vsphere_virtual_machine
        title: vsphere_virtual_machine Resource - terraform-provider-vsphere
        argumentDocs:
            name: '(Required) The name of the virtual machine.'
            resource_pool_id: '(Required) The managed object reference ID of the resource pool.'
            datastore_id: '(Optional) The managed object reference ID of the datastore.'
            num_cpus: '(Optional) The total number of virtual processor cores. Default: 1.'
            memory: '(Optional) The memory size in MB. Default: 1024.'
            guest_id: '(Optional) The guest ID for the OS type. Default: otherGuest64.'
        importStatements:
            - terraform import vsphere_virtual_machine.vm /dc/vm/my-vm
    vsphere_virtual_machine_snapshot:
        subCategory: Virtual Machine
        description: Manages a VMware vSphere virtual machine snapshot resource.
        name: vsphere_virtual_machine_snapshot
        title: vsphere_virtual_machine_snapshot Resource - terraform-provider-vsphere
        argumentDocs:
            virtual_machine_uuid: '(Required) The virtual machine UUID.'
            snapshot_name: '(Required) The name of the snapshot.'
            description: '(Required) A description for the snapshot.'
        importStatements: []
    vsphere_virtual_machine_class:
        subCategory: Virtual Machine
        description: Manages a VMware vSphere virtual machine class resource for Supervisor clusters.
        name: vsphere_virtual_machine_class
        title: vsphere_virtual_machine_class Resource - terraform-provider-vsphere
        argumentDocs:
            name: '(Required) The name of the virtual machine class.'
            cpus: '(Required) The number of CPUs.'
            memory: '(Required) The amount of memory in MB.'
        importStatements: []
